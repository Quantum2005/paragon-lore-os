<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARS-40 Editor</title>
  <link rel="stylesheet" href="./assets/crt-console.css" />
  <style>
    .screen {
      gap: 0.8rem;
    }

    .editor-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.6rem;
      font-size: clamp(13px, 1.75vw, 18px);
      color: var(--fg-dim);
    }

    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid rgba(137, 255, 159, 0.2);
      background: rgba(0, 0, 0, 0.35);
      padding: 0.6rem;
      gap: 0.45rem;
    }

    .editor-area {
      flex: 1;
      width: 100%;
      min-height: 0;
      resize: none;
      background: transparent;
      color: var(--fg);
      font-family: inherit;
      font-size: clamp(13px, 1.65vw, 18px);
      line-height: 1.38;
      border: none;
      outline: none;
      caret-color: var(--fg);
    }

    .command-hint {
      font-size: clamp(12px, 1.4vw, 15px);
      color: var(--fg-dim);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .btn {
      border: 1px solid rgba(137, 255, 159, 0.4);
      background: rgba(0, 0, 0, 0.25);
      color: var(--fg);
      font-family: inherit;
      font-size: clamp(12px, 1.4vw, 15px);
      padding: 0.25rem 0.5rem;
      cursor: pointer;
    }

    .btn:hover,
    .btn:focus-visible {
      background: rgba(137, 255, 159, 0.16);
      outline: none;
    }

    .status {
      min-height: 1.3em;
    }
  </style>
</head>
<body>
  <div class="crt" aria-label="CRT editor interface">
    <div class="noise" aria-hidden="true"></div>

    <main class="screen" role="application" aria-label="ARS-40 text editor">
      <section class="editor-header">
        <span id="fileLabel">EDIT://UNKNOWN</span>
        <span id="userLabel">USER://GUEST</span>
      </section>

      <section class="editor-panel">
        <textarea id="editor" class="editor-area" aria-label="Text editor"></textarea>
        <div class="toolbar">
          <button id="saveBtn" class="btn" type="button">CTRL+S SAVE</button>
          <button id="backBtn" class="btn" type="button">ESC RETURN</button>
        </div>
        <div class="command-hint">This editor supports free text editing like nano/vim style workflows. Use CTRL+S to save.</div>
      </section>

      <div id="status" class="status" aria-live="polite"></div>
    </main>
  </div>

  <script>
    const fileLabel = document.getElementById("fileLabel");
    const userLabel = document.getElementById("userLabel");
    const editor = document.getElementById("editor");
    const saveBtn = document.getElementById("saveBtn");
    const backBtn = document.getElementById("backBtn");
    const status = document.getElementById("status");

    const params = new URLSearchParams(window.location.search);
    const filename = String(params.get("file") || "").trim();
    const user = (sessionStorage.getItem("ars40:user") || "GUEST").toUpperCase();

    fileLabel.textContent = `EDIT://${filename || "UNKNOWN"}`;
    userLabel.textContent = `USER://${user}`;

    const showStatus = (message, error = false) => {
      status.textContent = message;
      status.style.color = error ? "var(--error)" : "var(--fg)";
      status.classList.add("show");
    };

    const fetchFile = async () => {
      if (!filename) {
        showStatus("MISSING FILE PARAMETER. RETURNING.", true);
        setTimeout(() => window.location.href = "./ars40-console.html", 600);
        return;
      }

      try {
        const response = await fetch(`/api/file?name=${encodeURIComponent(filename)}`);
        const payload = await response.json();
        if (!response.ok || payload.ok === false) {
          showStatus((payload.message || "FILE LOAD FAILED").toUpperCase(), true);
          editor.disabled = true;
          saveBtn.disabled = true;
          return;
        }

        if (Number(payload.file?.is_external) === 1 && payload.file?.external_url) {
          showStatus(`EXTERNAL LINK: ${payload.file.external_url}`, false);
          window.open(payload.file.external_url, "_blank", "noopener");
          setTimeout(() => {
            window.location.href = "./ars40-console.html";
          }, 700);
          return;
        }

        editor.value = String(payload.file?.content || "");
        showStatus("FILE READY. EDIT AND PRESS CTRL+S.", false);
        editor.focus();
      } catch (_error) {
        showStatus("FILE LOAD FAILED: API UNAVAILABLE", true);
      }
    };

    const save = async () => {
      if (!filename || editor.disabled) return;

      try {
        const response = await fetch("/api/file", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "x-ars40-user": user
          },
          body: JSON.stringify({ filename, content: editor.value })
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok || payload.ok === false) {
          showStatus((payload.message || "SAVE FAILED").toUpperCase(), true);
          return;
        }

        showStatus(`SAVED ${filename.toUpperCase()} TO D1 DATABASE.`, false);
      } catch (_error) {
        showStatus("SAVE FAILED: API UNAVAILABLE", true);
      }
    };

    saveBtn.addEventListener("click", () => {
      void save();
    });

    backBtn.addEventListener("click", () => {
      window.location.href = "./ars40-console.html";
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        event.preventDefault();
        window.location.href = "./ars40-console.html";
        return;
      }

      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
        event.preventDefault();
        void save();
      }
    });

    fetchFile();
  </script>
</body>
</html>
