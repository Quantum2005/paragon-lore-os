<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay Chat Service</title>
  <link rel="stylesheet" href="./assets/chat-relay.css" />
</head>
<body>
  <div class="crt" aria-label="Relay chat interface">
    <div class="noise" aria-hidden="true"></div>
    <main class="screen">
      <header class="topbar">
        <div id="channelLabel">INTERCHAT RELAY NETWORK // CHANNEL #LOBBY</div>
        <div id="whoami"></div>
      </header>

      <section class="table-wrap">
        <table class="chat-table" id="chatTable">
          <thead>
            <tr>
              <th class="meta-col">USERNAME</th>
              <th class="meta-col">TIME</th>
              <th>CHAT</th>
            </tr>
          </thead>
          <tbody id="chatBody"></tbody>
        </table>
      </section>

      <form id="composer" class="composer">
        <span class="prompt">&gt;</span>
        <input id="messageInput" type="text" maxlength="600" autocomplete="off" spellcheck="false" placeholder="Type message. Commands: /join /msg /inbox /nick /reload /exit" />
      </form>

      <div id="status" class="status" aria-live="polite"></div>
      <div id="inboxStatus" class="status inbox-status" aria-live="polite"></div>
    </main>

    <div id="modMenu" class="mod-menu" hidden>
      <div class="mod-title">MODERATION PANEL</div>
      <div class="mod-item">Message ID: <span id="modMessageId">-</span></div>
      <div class="mod-item">User ID: <span id="modUserId">-</span></div>
      <button data-action="delete">Delete Message</button>
      <button data-action="mute">Mute User</button>
      <button data-action="ban">Ban User</button>
      <button data-action="close">Close</button>
    </div>
  </div>

  <script src="./assets/chat-relay.js"></script>
</body>
</html>
