<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARS-40 Console</title>
  <link rel="stylesheet" href="./assets/crt-console.css" />
</head>
<body>
  <div class="crt" aria-label="CRT terminal interface">
    <div class="noise" aria-hidden="true"></div>

    <main class="screen" role="application" aria-label="Armed Research Site 40 terminal">
      <section id="consoleOutput" class="console-output show" aria-live="polite"></section>

      <div id="promptRow" class="prompt-row" aria-label="Console command input">
        <span id="pathLabel" class="path">ARS40://TERM</span>
        <span class="prompt">&gt;</span>
        <input id="consoleInput" class="console-input" type="text" autocomplete="off" spellcheck="false" />
      </div>

      <div id="status" class="status" aria-live="polite"></div>
    </main>
  </div>

  <script>
    const output = document.getElementById("consoleOutput");
    const promptRow = document.getElementById("promptRow");
    const pathLabel = document.getElementById("pathLabel");
    const consoleInput = document.getElementById("consoleInput");
    const status = document.getElementById("status");

    const POWER_OFF_URL = "./index.html";
    const LOGIN_URL = "./crt-console.html?resume=1";
    const user = sessionStorage.getItem("ars40:user") || "GUEST";
    const role = (sessionStorage.getItem("ars40:role") || "standard").toLowerCase();

    const roleAllowed = new Set(["standard", "editor", "administrator"]);
    const activeRole = roleAllowed.has(role) ? role : "standard";

    pathLabel.textContent = `ARS40://${user}`;

    const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const addLine = (text) => {
      const line = document.createElement("div");
      line.className = "line";
      line.textContent = text;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
      return line;
    };

    const typeLine = (text, speed = 12) => new Promise((resolve) => {
      const line = addLine("");
      let i = 0;

      const tick = () => {
        line.innerHTML = `${text.slice(0, i)}<span class="typing-cursor">█</span>`;
        i += 1;
        if (i <= text.length) {
          setTimeout(tick, speed);
        } else {
          line.textContent = text;
          resolve();
        }
      };

      tick();
    });

    const showStatus = (message, error = false) => {
      status.textContent = message;
      status.style.color = error ? "var(--error)" : "var(--fg)";
      status.classList.add("show");
    };

    const clearStatus = () => {
      status.textContent = "";
      status.classList.remove("show");
    };

    const logo = [
"        _____ __________       __________  __  ___   ______  ___  ______________  _   __",
"  / ___// ____/ __ \     / ____/ __ \/ / / / | / / __ \/   |/_  __/  _/ __ \/ | / /     ",
"  \__ \/ /   / /_/ /    / /_  / / / / / / /  |/ / / / / /| | / /  / // / / /  |/ /      ",
" ___/ / /___/ ____/    / __/ / /_/ / /_/ / /|  / /_/ / ___ |/ / _/ // /_/ / /|  /       ",
"/____/\____/_/        /_/    \____/\____/_/ |_/_____/_/  |_/_/ /___/\____/_/ |_/        ",
                                                                                   
"                        PARAGON RESEARCH INSTITUTE (ARS-40) CONSOLE                     "
    ];

    const placeholders = [
      "type <filename> - placeholder: view file contents",
      "more <filename> - placeholder: paginated output",
      "edit <filename> - placeholder: launch text editor"
    ];

    const printHelp = () => {
      addLine("AVAILABLE COMMANDS:");
      addLine("  help   - display list of commands");
      addLine("  logout - return to crt-console without startup");
      addLine("  exit   - power off to index.html");
      placeholders.forEach((entry) => addLine(`  ${entry}`));
      if (activeRole === "administrator") {
        addLine("  goto <url> - administrator-only URL redirect");
      }
      addLine(`CURRENT ROLE: ${activeRole.toUpperCase()}`);
    };

    const bootHiddenRedirect = async () => {
      const recentLines = JSON.parse(sessionStorage.getItem("ars40:lastLines") || "[]");
      recentLines.forEach((line) => addLine(line));
      await wait(220);

      for (let i = 0; i < 10; i += 1) {
        addLine(".");
        await wait(24);
      }

      await typeLine("[SYS ] [LOADING CONSOLE COMMANDS]", 11);
      await typeLine(`[AUTH] USER ${user} / STATUS ${activeRole.toUpperCase()} VERIFIED`, 11);
      await typeLine("[CONSOLE] DRAWING SITE BANNER...", 10);

      for (const line of logo) {
        await typeLine(line, 6);
      }

      await typeLine("Type HELP and press [ENTER] to list available commands.", 11);
      promptRow.classList.add("show");
      consoleInput.focus();
    };

    const runCommand = (raw) => {
      const input = raw.trim();
      if (!input) return;

      addLine(`>${input}`);
      const [command, ...args] = input.split(/\s+/);
      const cmd = command.toLowerCase();

      if (cmd === "help") {
        printHelp();
        return;
      }

      if (cmd === "logout") {
        addLine("THANK YOU FOR USING THE CONSOLE - LOGGING OUT...");
        window.location.href = LOGIN_URL;
        return;
      }

      if (cmd === "exit") {
        addLine("MACHINE POWERING OFF... PLEASE DO NOT REMOVE STORAGE VOLUMES!");
        window.location.href = POWER_OFF_URL;
        return;
      }

      if (["type", "more", "edit"].includes(cmd)) {
        addLine("PLACEHOLDER COMMAND ONLY. FEATURE TO BE IMPLEMENTED.");
        return;
      }

      if (cmd === "goto") {
        if (activeRole !== "administrator") {
          showStatus("ACCESS DENIED [ERROR 401 UNAUTHORIZED]", true);
          return;
        }

        const target = args.join(" ").trim();
        if (!target) {
          showStatus("USAGE: goto <url>", true);
          return;
        }

        const url = /^https?:\/\//i.test(target) ? target : `https://${target}`;
        addLine(`REDIRECTING TO ${url}`);
        window.location.href = url;
        return;
      }

      showStatus(`UNKNOWN COMMAND: ${cmd.toUpperCase()}`, true);
    };

    consoleInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      clearStatus();
      runCommand(consoleInput.value);
      consoleInput.value = "";
    });

    bootHiddenRedirect();
  </script>
</body>
</html>
