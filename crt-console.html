<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRT Console Login</title>
  <style>
    :root {
      --bg: #020603;
      --fg: #89ff9f;
      --fg-dim: #53ba68;
      --scanline: rgba(0, 0, 0, 0.24);
      --glow: rgba(137, 255, 159, 0.3);
      --error: #ff9696;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "Courier New", Courier, monospace;
      color: var(--fg);
    }

    .crt {
      position: relative;
      width: 100%;
      height: 100%;
      padding: clamp(14px, 2.6vw, 30px);
      background: radial-gradient(circle at center, #0d2015 0%, #041008 58%, #000 100%);
      text-shadow: 0 0 1px var(--fg), 0 0 5px var(--glow);
      filter: contrast(1.07) saturate(1.08);
      animation: bootFlicker 4.8s steps(1, end) 1 forwards;
    }

    .crt::before,
    .crt::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .crt::before {
      background: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 2px,
        var(--scanline) 3px,
        transparent 4px
      );
      opacity: 0.78;
      mix-blend-mode: multiply;
    }

    .crt::after {
      background: radial-gradient(circle at center, transparent 58%, rgba(0, 0, 0, 0.62) 100%);
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.09;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.7) 0.6px, transparent 0.7px);
      background-size: 3px 3px;
      animation: noise 90ms steps(2) infinite;
    }

    .screen {
      position: relative;
      width: min(980px, 100%);
      height: 100%;
      margin: 0 auto;
      z-index: 1;
      border: 1px solid rgba(137, 255, 159, 0.25);
      background: rgba(0, 9, 4, 0.43);
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .boot-output,
    .console-output {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.36;
      font-size: clamp(13px, 1.75vw, 18px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(137, 255, 159, 0.35) rgba(0, 0, 0, 0.25);
    }

    .boot-output {
      flex: 1;
    }

    .console-output {
      flex: 1;
      display: none;
      opacity: 0;
    }

    .console-output.show {
      display: block;
      animation: fadeIn 1.6s ease forwards;
    }

    .line {
      opacity: 0;
      animation: blinkIn 260ms steps(1, end) forwards;
    }

    .typing-cursor {
      display: inline-block;
      width: 0.62ch;
      margin-left: 0.1ch;
      animation: cursorBlink 0.85s steps(1, end) infinite;
    }

    .prompt-row {
      display: none;
      align-items: center;
      gap: 0.35rem;
      font-size: clamp(13px, 1.75vw, 18px);
      opacity: 0;
    }

    .prompt-row.show {
      display: flex;
      animation: fadeIn 900ms ease forwards;
    }

    .path {
      color: var(--fg-dim);
      min-width: 15ch;
      letter-spacing: 0.02em;
    }

    .prompt {
      color: var(--fg);
    }

    .console-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--fg);
      font-family: inherit;
      font-size: inherit;
      outline: none;
      caret-color: var(--fg);
      padding: 0;
      min-width: 12ch;
    }

    .status {
      min-height: 1.3em;
      font-size: clamp(12px, 1.5vw, 16px);
      color: var(--error);
      opacity: 0;
      transition: opacity 220ms ease;
    }

    .status.show {
      opacity: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blinkIn {
      0%, 38% { opacity: 0; }
      39%, 52% { opacity: 1; }
      53%, 65% { opacity: 0; }
      66%, 100% { opacity: 1; }
    }

    @keyframes cursorBlink {
      50% { opacity: 0; }
    }

    @keyframes noise {
      from { transform: translate(0, 0); }
      to { transform: translate(-3px, 2px); }
    }

    @keyframes bootFlicker {
      0% { opacity: 0; filter: brightness(0); }
      4% { opacity: 0.12; filter: brightness(2.8); }
      8% { opacity: 0.46; filter: brightness(0.28); }
      13% { opacity: 0.25; filter: brightness(2.2); }
      18% { opacity: 0.58; filter: brightness(0.5); }
      23% { opacity: 0.34; filter: brightness(1.8); }
      29% { opacity: 0.75; filter: brightness(0.65); }
      35% { opacity: 0.5; filter: brightness(1.5); }
      42% { opacity: 0.8; filter: brightness(0.8); }
      50% { opacity: 0.61; filter: brightness(1.35); }
      60% { opacity: 0.92; filter: brightness(0.88); }
      72% { opacity: 0.8; filter: brightness(1.18); }
      85% { opacity: 0.95; filter: brightness(0.95); }
      100% { opacity: 1; filter: brightness(1); }
    }
  </style>
</head>
<body>
  <div class="crt" aria-label="CRT terminal interface">
    <div class="noise" aria-hidden="true"></div>

    <main class="screen" role="application" aria-label="DOS and IRC inspired terminal">
      <section id="bootOutput" class="boot-output" aria-live="polite"></section>

      <section id="consoleOutput" class="console-output" aria-live="polite"></section>

      <div id="promptRow" class="prompt-row" aria-label="Console command input">
        <span id="pathLabel" class="path">C://CONSOLE</span>
        <span class="prompt">&gt;</span>
        <input id="consoleInput" class="console-input" type="text" autocomplete="off" spellcheck="false" />
      </div>

      <div id="status" class="status" aria-live="polite"></div>
    </main>
  </div>

  <script>
    const bootOutput = document.getElementById("bootOutput");
    const consoleOutput = document.getElementById("consoleOutput");
    const promptRow = document.getElementById("promptRow");
    const pathLabel = document.getElementById("pathLabel");
    const consoleInput = document.getElementById("consoleInput");
    const status = document.getElementById("status");

    // Deploy the Apps Script as a Web App and paste its /exec URL below.
    const AUTH_ENDPOINT = "https://script.google.com/macros/s/AKfycbxcZhFRSdqKWdmOU23cKTiYLWwPSIaapgQVcHdzswTjP0i_6A59eYgx3H8EB3XtWVB2/exec";
    // File to load after successful authentication inside the same iframe/page.
    const NEXT_FILE_URL = "./main-console.html";

    const bootLines = [
      { text: "[SYS ] RESTART REQUEST ACCEPTED......OK", hold: 160 },
      { text: "[SYS ] STOPPING ACTIVE TASKS.........COMPLETE", hold: 220 },
      { text: "[SYS ] FLUSHING SESSION CACHE........COMPLETE", hold: 240 },
      { text: "[BOOT] HANDOFF TO LDOS BOOTLDR.......COMPLETE", hold: 180 },
      { text: "[BOOT] REINITIALIZING DEVICE TABLE...OK", hold: 180 },
      { text: "[BOOT] RELOADING NETWORK STACK........OK", hold: 180 },
      { text: "[APP ] STARTING CONSOLE KERNEL.......READY", hold: 620 },
      { text: "[APP ] STARTING IRC LINK MODULE......READY", hold: 680 },
      { text: "[APP ] STARTING AUTH SERVICE.........READY", hold: 740 },
      { text: "[APP ] STARTING OPERATOR CONSOLE.....READY", hold: 760 },
      { text: "[MSG ] RESTART COMPLETE / STANDBY", hold: 180 }
    ];

    const greetingLines = [
      { text: "MS-LINK 4.2 (C) 1989 TERMINAL SUBSYSTEM", hold: 140 },
      { text: "NODE: #ops-main / BAUD: 14400", hold: 180 },
      { text: "AUTH GATE ONLINE.................READY", hold: 700 },
      { text: "", hold: 80 },
      { text: "Enter USERNAME and press [ENTER].", hold: 120 }
    ];

    const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    const authenticate = async (username, password) => {
      const response = await fetch(AUTH_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      if (!response.ok) {
        throw new Error(`Auth service HTTP ${response.status}`);
      }

      return response.json();
    };

    const proceedToNextFile = () => {
      window.location.href = NEXT_FILE_URL;
    };

    const addLine = (container, text) => {
      const line = document.createElement("div");
      line.className = "line";
      line.textContent = text;
      container.appendChild(line);
      container.scrollTop = container.scrollHeight;
      return line;
    };

    const typeLine = (container, text, speed = 18) => {
      return new Promise((resolve) => {
        let i = 0;
        const line = addLine(container, "");

        const tick = () => {
          const typed = text.slice(0, i);
          line.innerHTML = `${typed}<span class="typing-cursor">█</span>`;
          i += 1;
          if (i <= text.length) {
            setTimeout(tick, speed);
          } else {
            line.textContent = text;
            resolve();
          }
        };

        tick();
      });
    };

    const wipeBootLinesBackwards = () => {
      return new Promise((resolve) => {
        const lines = Array.from(bootOutput.querySelectorAll(".line"));
        const totalChars = lines.reduce((sum, line) => sum + line.textContent.length, 0) || 1;
        const charDelay = Math.max(1, Math.floor(1900 / totalChars));

        const eraseTick = () => {
          const activeLines = bootOutput.querySelectorAll(".line");
          const lastLine = activeLines[activeLines.length - 1];

          if (!lastLine) {
            resolve();
            return;
          }

          if (lastLine.textContent.length > 0) {
            lastLine.textContent = lastLine.textContent.slice(0, -1);
            setTimeout(eraseTick, charDelay);
            return;
          }

          lastLine.remove();
          setTimeout(eraseTick, 0);
        };

        eraseTick();
      });
    };

    const showStatus = (message, isError = true) => {
      status.textContent = message;
      status.style.color = isError ? "var(--error)" : "var(--fg)";
      status.classList.add("show");
    };

    const clearStatus = () => {
      status.textContent = "";
      status.classList.remove("show");
    };

    const state = {
      stage: "username",
      username: ""
    };

    const beginConsole = async () => {
      bootOutput.style.display = "none";
      consoleOutput.classList.add("show");

      for (const entry of greetingLines) {
        await typeLine(consoleOutput, entry.text, 14 + Math.floor(Math.random() * 13));
        await wait(entry.hold);
      }

      promptRow.classList.add("show");
      consoleInput.focus();
    };

    const bootSequence = async () => {
      await wait(1300);

      for (const entry of bootLines) {
        await typeLine(bootOutput, entry.text, 10 + Math.floor(Math.random() * 14));
        await wait(entry.hold);
      }

      await wait(140);
      await wipeBootLinesBackwards();
      await wait(120);
      beginConsole();
    };

    consoleInput.addEventListener("keydown", async (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      clearStatus();

      const value = consoleInput.value.trim();
      if (!value) {
        showStatus("INPUT REQUIRED.");
        return;
      }

      if (state.stage === "username") {
        state.username = value.toUpperCase();
        pathLabel.textContent = `C://${state.username}`;

        await typeLine(consoleOutput, `USERNAME ACCEPTED: ${state.username}`, 10);
        await typeLine(consoleOutput, "Enter PASSWORD and press [ENTER].", 10);

        state.stage = "password";
        consoleInput.value = "";
        consoleInput.type = "password";
        return;
      }

      const masked = "*".repeat(Math.max(6, value.length));
      await typeLine(consoleOutput, `PASSWORD: ${masked}`, 10);
      await typeLine(consoleOutput, `AUTH REQUEST SENT FOR ${state.username}...`, 10);
      showStatus("VERIFYING WITH FIXED ACCOUNT DATABASE...", false);

      try {
        const result = await authenticate(state.username, value);

        if (result.ok) {
          await typeLine(consoleOutput, `ACCESS GRANTED: ${state.username}`, 10);
          showStatus("LOGIN ACCEPTED - LOADING NEXT FILE", false);
          await wait(260);
          proceedToNextFile();
          return;
        }

        if (result.code === "BAD_PASSWORD") {
          await typeLine(consoleOutput, "ACCESS DENIED: INCORRECT PASSWORD", 10);
          showStatus("INCORRECT PASSWORD. TRY AGAIN.");
          consoleInput.value = "";
          consoleInput.type = "password";
          state.stage = "password";
          return;
        }

        await typeLine(consoleOutput, `ACCESS DENIED: ${result.message || "AUTH FAILED"}`, 10);
        showStatus((result.message || "AUTH FAILED").toUpperCase());
      } catch (error) {
        await typeLine(consoleOutput, "ACCESS DENIED: AUTH SERVICE UNAVAILABLE", 10);
        showStatus("AUTH SERVICE UNAVAILABLE. TRY AGAIN.");
      }

      consoleInput.value = "";
      consoleInput.type = "text";
      state.stage = "username";
      state.username = "";
      pathLabel.textContent = "C://CONSOLE";
      await typeLine(consoleOutput, "", 10);
      await typeLine(consoleOutput, "Enter USERNAME and press [ENTER].", 10);
    });

    bootSequence();
  </script>
</body>
</html>
