<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LDOS Boot Console</title>
  <style>
    :root {
      --fg: #c8c8c8;
      --fg-bright: #ffffff;
      --bg: #000000;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: "Courier New", Courier, monospace;
    }

    body {
      display: grid;
      place-items: center;
      padding: 0.6rem;
    }

    .screen {
      width: min(1180px, 100%);
      height: min(98vh, 860px);
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--bg);
    }

    .titlebar {
      color: var(--fg-bright);
      padding: 0.2rem 0;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-align: center;
    }

    .power-wrap {
      display: grid;
      place-items: center;
      padding: 0.2rem 0 0.6rem;
      min-height: 72px;
    }

    .power-btn {
      width: 62px;
      height: 62px;
      border: none;
      background: transparent;
      color: var(--fg-bright);
      cursor: pointer;
      padding: 0;
      display: grid;
      place-items: center;
      transition: transform 120ms ease;
    }

    .power-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      display: block;
    }

    .power-btn:hover { transform: scale(1.04); }

    .power-btn:focus-visible {
      outline: 1px dashed var(--fg-bright);
      outline-offset: 4px;
    }

    .power-btn.on {
      color: var(--fg-bright);
      cursor: not-allowed;
    }

    .terminal {
      white-space: pre-wrap;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0.35rem 0;
      line-height: 1.24;
      font-size: clamp(12px, 1.55vw, 18px);
      scrollbar-width: thin;
      scrollbar-color: #555 #111;
    }

    .line { min-height: 1.2em; }

    .cursor {
      display: inline-block;
      width: 0.6ch;
      height: 1.05em;
      background: var(--fg);
      margin-left: 1px;
      animation: blink 1s steps(1, end) infinite;
      vertical-align: baseline;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="screen" role="application" aria-label="LDOS boot screen">

    <div class="power-wrap">
      <button id="powerButton" class="power-btn" title="Power" aria-label="Power on"><img id="powerIcon" src="./assets/power-off.png" alt="Power off" /></button>
    </div>

    <section id="terminal" class="terminal" aria-live="polite"></section>

  </main>

  <script src="./assets/index.js"></script>

</body>
</html>
